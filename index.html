<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROUND COMPANY</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{ --lime:#d7e84d; --ink:#17191f; --blue:#a7cde4; }
  *{font-family:'Pretendard',sans-serif;box-sizing:border-box;}
  body{margin:0;background:var(--lime);color:var(--ink);}
  .hl{letter-spacing:-2.5px;line-height:1.08;}
  .fade-up{opacity:0;transform:translateY(22px);animation:fadeUp .7s ease forwards;}
  .d1{animation-delay:.05s}.d2{animation-delay:.16s}.d3{animation-delay:.27s}.d4{animation-delay:.4s}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  .btn{transition:transform .2s;} .btn:hover{transform:translateY(-3px);}
  .ncard{transition:transform .28s ease, box-shadow .28s ease;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;min-height:230px;border-radius:22px;padding:24px;box-shadow:0 10px 30px -16px rgba(0,0,0,.35);}
  .ncard:hover{transform:translateY(-10px) rotate(0deg) !important;box-shadow:0 26px 50px -22px rgba(0,0,0,.5);}
  .ncard .num{font-weight:900;font-size:40px;letter-spacing:-2px;line-height:1;opacity:.35;}
  .icon{font-size:34px;text-align:center;margin-top:14px;}
  .stat b{font-variant-numeric:tabular-nums;display:block;font-weight:900;letter-spacing:-2px;}
  ::selection{background:var(--ink);color:var(--lime);}
</style>
</head>
<body>

<section style="padding:clamp(20px,3.5vw,44px) clamp(20px,4vw,48px) clamp(40px,6vw,72px);">
  <header class="flex items-center justify-between fade-up d1" style="max-width:1120px;margin:0 auto;">
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center justify-center rounded-full" style="width:32px;height:32px;background:var(--ink);color:var(--lime);font-weight:900;">R</span>
      <span style="font-weight:800;letter-spacing:-.5px;">ROUND COMPANY</span>
    </div>
    <a href="#contact" class="btn inline-flex items-center rounded-full" style="background:var(--ink);color:#fff;padding:9px 18px;font-weight:700;font-size:14px;">상담 문의</a>
  </header>

  <div style="max-width:900px;margin:clamp(30px,5vw,60px) auto 0;text-align:center;">
    <p class="fade-up d1" style="font-weight:700;font-size:14px;color:#4a5a1e;margin-bottom:18px;">네이버 블로그 · 플레이스 · 숏폼 마케팅 대행</p>
    <h1 class="hl fade-up d2" style="font-weight:900;font-size:clamp(40px,8.5vw,90px);color:var(--ink);">광고비 말고,<br>매출을 만듭니다.</h1>
    <p class="fade-up d3" style="max-width:540px;margin:22px auto 0;font-size:clamp(15px,2.2vw,19px);line-height:1.6;color:#3c4420;">
      문의가 들어오는 마케팅 · 재계약률 98%, 결과 없으면 <b>100% 환불</b>.
    </p>
    <div class="fade-up d4 flex flex-wrap justify-center gap-3" style="margin-top:30px;">
      <a href="#analysis" class="btn" style="background:var(--ink);color:#fff;padding:16px 32px;border-radius:999px;font-weight:800;font-size:16px;">무료 마케팅 진단받기 →</a>
    </div>
  </div>

  <!-- 번호 카드 4개 (참고 이미지 느낌) -->
  <div class="grid fade-up d4" style="max-width:1040px;margin:clamp(40px,6vw,64px) auto 0;gap:18px;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));">
    <div>
      <a href="#services" class="ncard" style="background:var(--blue);transform:rotate(-2.5deg);">
        <span class="num" style="color:#1c3a52">01</span>
        <div><h3 style="font-weight:800;font-size:21px;letter-spacing:-1px;color:#15303f">서비스 소개</h3><p style="color:#3a5266;font-size:12.5px;margin-top:5px;">블로그·플레이스·숏폼</p></div>
      </a>
      <div class="icon">💻</div>
    </div>
    <div>
      <a href="#cases" class="ncard" style="background:#fff;transform:rotate(1.8deg);">
        <span class="num" style="color:#999">02</span>
        <div><h3 style="font-weight:800;font-size:21px;letter-spacing:-1px;color:var(--ink)">성공사례 후기</h3><p style="color:#888;font-size:12.5px;margin-top:5px;">매출 오른 사장님들</p></div>
      </a>
      <div class="icon">🖥️</div>
    </div>
    <div>
      <a href="#knowhow" class="ncard" style="background:var(--blue);transform:rotate(-1.5deg);">
        <span class="num" style="color:#1c3a52">03</span>
        <div><h3 style="font-weight:800;font-size:21px;letter-spacing:-1px;color:#15303f">마케팅 노하우</h3><p style="color:#3a5266;font-size:12.5px;margin-top:5px;">상위노출·단골 만들기</p></div>
      </a>
      <div class="icon">✏️</div>
    </div>
    <div>
      <a href="#contact" class="ncard" style="background:var(--ink);transform:rotate(2.5deg);">
        <span class="num" style="color:#666">04</span>
        <div><h3 style="font-weight:800;font-size:21px;letter-spacing:-1px;color:#fff">컨설팅 문의하기</h3><p style="color:#bbb;font-size:12.5px;margin-top:5px;">맞춤 무료 상담</p></div>
      </a>
      <div class="icon">💬</div>
    </div>
  </div>
</section>

<!-- 숫자 카운트업 섹션 -->
<section id="stats" style="background:var(--ink);color:#fff;padding:clamp(50px,8vw,96px) clamp(20px,4vw,48px);">
  <div class="flex flex-wrap justify-center text-center" style="max-width:1000px;margin:0 auto;gap:clamp(30px,8vw,90px);">
    <div class="stat"><b style="font-size:clamp(44px,8vw,68px);color:var(--lime)"><span data-target="98" data-suffix="%">0%</span></b><span style="color:#aaa;font-size:15px;margin-top:6px;display:block;">재계약률</span></div>
    <div class="stat"><b style="font-size:clamp(44px,8vw,68px);color:var(--lime)"><span data-target="100" data-suffix="%">0%</span></b><span style="color:#aaa;font-size:15px;margin-top:6px;display:block;">결과 없으면 환불</span></div>
    <div class="stat"><b style="font-size:clamp(44px,8vw,68px);color:var(--lime)">월 단위</b><span style="color:#aaa;font-size:15px;margin-top:6px;display:block;">부담 없는 계약</span></div>
  </div>
</section>

<script>
  function countUp(el){
    var target=+el.dataset.target, suf=el.dataset.suffix||'', dur=1500, start=null;
    function tick(t){ if(!start)start=t; var p=Math.min((t-start)/dur,1);
      el.textContent=Math.floor(p*target)+suf; if(p<1)requestAnimationFrame(tick); }
    requestAnimationFrame(tick);
  }
  var io=new IntersectionObserver(function(es){es.forEach(function(e){
    if(e.isIntersecting){countUp(e.target);io.unobserve(e.target);}})},{threshold:.6});
  document.querySelectorAll('[data-target]').forEach(function(el){io.observe(el);});
</script>

</body>
</html>
