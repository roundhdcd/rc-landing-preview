<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROUND COMPANY</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --navy:#16233f;       /* 메인 네이비 */
    --navy2:#1f3360;
    --orange:#ff6a1a;     /* 포인트 오렌지 */
    --cream:#fbf7f0;      /* 배경 크림 */
    --ink:#1a1a1a;
  }
  *{font-family:'Pretendard',sans-serif;}
  body{margin:0;background:var(--cream);color:var(--ink);}
  .fade-up{opacity:0;transform:translateY(24px);animation:fadeUp .8s ease forwards;}
  .d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.31s}.d4{animation-delay:.44s}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  .card{transition:transform .25s ease, box-shadow .25s ease;cursor:pointer;}
  .card:hover{transform:translateY(-10px);}
  .card .arrow{transition:transform .25s ease;}
  .card:hover .arrow{transform:translate(4px,-4px);}
  .badge-spin{animation:spin 14s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .headline{letter-spacing:-2.5px;line-height:1.04;}
  ::selection{background:var(--orange);color:#fff;}
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<section class="w-full" style="background:var(--cream);min-height:100vh;padding:clamp(20px,4vw,48px);">
  <!-- 상단바 -->
  <header class="flex items-center justify-between fade-up d1">
    <div class="flex items-center gap-2">
      <span class="badge-spin inline-flex items-center justify-center rounded-full" style="width:34px;height:34px;background:var(--orange);color:#fff;font-weight:900;">R</span>
      <span style="font-weight:800;letter-spacing:-.5px;font-size:18px;color:var(--navy)">ROUND COMPANY</span>
    </div>
    <nav class="hidden md:flex items-center gap-7" style="font-weight:600;color:var(--navy);font-size:15px;">
      <a href="#" class="hover:opacity-60">서비스</a>
      <a href="#" class="hover:opacity-60">사례</a>
      <a href="#" class="hover:opacity-60">블로그</a>
      <a href="#" class="inline-flex items-center rounded-full" style="background:var(--navy);color:#fff;padding:9px 18px;">문의하기</a>
    </nav>
  </header>

  <!-- 헤드라인 -->
  <div style="max-width:1100px;margin:clamp(40px,8vw,90px) auto 0;">
    <p class="fade-up d1" style="color:var(--orange);font-weight:800;font-size:clamp(14px,2vw,17px);margin-bottom:18px;">광고대행사의 본질</p>
    <h1 class="headline fade-up d2" style="font-weight:900;color:var(--navy);font-size:clamp(40px,8vw,92px);">
      클라이언트의 <span style="color:var(--orange)">매출 증가</span><br>그것이 전부입니다.
    </h1>
    <p class="fade-up d3" style="max-width:620px;margin-top:26px;font-size:clamp(15px,2.2vw,19px);line-height:1.65;color:#43506b;">
      네이버 블로그·플레이스 마케팅부터 숏폼·브랜드 운영까지.
      재계약률 98%로 증명된 라운드컴퍼니의 성장 전략을 경험해보세요.
    </p>
  </div>

  <!-- 카드 3개 -->
  <div class="grid fade-up d4" style="max-width:1100px;margin:clamp(36px,6vw,64px) auto 0;gap:18px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
    <!-- 상품구성 -->
    <a href="#products" class="card rounded-[26px] p-7 flex flex-col justify-between" style="background:var(--navy);color:#fff;min-height:230px;box-shadow:0 16px 40px -20px rgba(22,35,63,.6);">
      <div class="flex items-start justify-between">
        <span style="font-size:34px">📦</span>
        <span class="arrow" style="font-size:22px;opacity:.7">↗</span>
      </div>
      <div>
        <h3 style="font-weight:900;font-size:30px;letter-spacing:-1px;line-height:1.1;">상품구성</h3>
        <p style="margin-top:8px;opacity:.7;font-size:14px;line-height:1.5;">블로그·플레이스·숏폼 패키지를 한눈에</p>
      </div>
    </a>
    <!-- 문의하기 -->
    <a href="#contact" class="card rounded-[26px] p-7 flex flex-col justify-between" style="background:var(--orange);color:#fff;min-height:230px;box-shadow:0 16px 40px -20px rgba(255,106,26,.6);">
      <div class="flex items-start justify-between">
        <span style="font-size:34px">💬</span>
        <span class="arrow" style="font-size:22px;opacity:.85">↗</span>
      </div>
      <div>
        <h3 style="font-weight:900;font-size:30px;letter-spacing:-1px;line-height:1.1;">문의하기</h3>
        <p style="margin-top:8px;opacity:.9;font-size:14px;line-height:1.5;">우리 매장에 맞는 전략, 무료로 상담</p>
      </div>
    </a>
    <!-- 분석하기 -->
    <a href="#analysis" class="card rounded-[26px] p-7 flex flex-col justify-between" style="background:#fff;color:var(--navy);min-height:230px;border:2px solid #e9e1d3;box-shadow:0 16px 40px -24px rgba(0,0,0,.25);">
      <div class="flex items-start justify-between">
        <span style="font-size:34px">📊</span>
        <span class="arrow" style="font-size:22px;color:var(--orange)">↗</span>
      </div>
      <div>
        <h3 style="font-weight:900;font-size:30px;letter-spacing:-1px;line-height:1.1;">분석하기</h3>
        <p style="margin-top:8px;color:#6b7488;font-size:14px;line-height:1.5;">내 채널·경쟁사 무료 진단 리포트</p>
      </div>
    </a>
  </div>
</section>

<!-- ===== 아래로 스크롤되는 다음 섹션 (예시) ===== -->
<section style="background:var(--navy);color:#fff;padding:clamp(48px,9vw,110px) clamp(20px,4vw,48px);">
  <div style="max-width:1100px;margin:0 auto;text-align:center;">
    <p style="color:var(--orange);font-weight:800;margin-bottom:14px;">검증된 성과</p>
    <h2 class="headline" style="font-weight:900;font-size:clamp(30px,5vw,56px);">재계약률 <span style="color:var(--orange)">98%</span>가 증명합니다</h2>
    <p style="margin-top:18px;opacity:.7;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.6;">2025년 11월 기준. 결과로 말하는 마케팅, 라운드컴퍼니.</p>
  </div>
</section>

</body>
</html>
